name: Native Latest Candidate

on:
  push: {}
  workflow_dispatch:
    inputs:
      version:
        description: "Claude Code version to verify. Leave empty to use npm latest."
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  validate:
    name: Validate native candidate workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run native workflow contract tests
        run: node --test tests/native-latest-workflow.test.js tests/native-candidate-promotion.test.js tests/native-failure-handoff.test.js tests/native-release-closeout.test.js tests/upstream-text-diff.test.js

  verify:
    name: Verify macOS native candidate
    needs: validate
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # GitHub currently maps macos-15 to the macOS 15 arm64 hosted runner.
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install native verification dependency
        run: npm install --no-save node-lief

      - name: Resolve candidate version
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version || '' }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(npm view @anthropic-ai/claude-code version)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify native candidate
        id: verify
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JSON_PATH="${RUNNER_TEMP}/native-latest-candidate-${VERSION}.json"
          set +e
          node scripts/verify-upstream-compat.js --baseline "${VERSION}" --skip-latest --native-macos-arm64 --json > "$JSON_PATH"
          STATUS=$?
          set -e
          echo "json_path=${JSON_PATH}" >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Upload native candidate JSON
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: native-latest-candidate-${{ steps.version.outputs.version }}
          path: ${{ steps.verify.outputs.json_path }}
          if-no-files-found: error

      - name: Generate native text diff report
        id: text_diff
        if: always() && steps.version.outputs.version != ''
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TEXT_REPORT_PATH="${RUNNER_TEMP}/native-latest-text-diff-${VERSION}.md"
          set +e
          node scripts/generate-upstream-text-diff.js --to "${VERSION}" --native-macos-arm64 > "$TEXT_REPORT_PATH"
          TEXT_REPORT_STATUS=$?
          set -e
          if [ "$TEXT_REPORT_STATUS" -ne 0 ]; then
            {
              echo "# Upstream text diff: unavailable"
              echo
              echo "Text diff report failed; see workflow logs before treating this candidate as fully reviewed."
            } > "$TEXT_REPORT_PATH"
          fi
          echo "text_report_path=${TEXT_REPORT_PATH}" >> "$GITHUB_OUTPUT"
          {
            echo "## Native latest text diff"
            cat "$TEXT_REPORT_PATH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native text diff report
        if: always() && steps.text_diff.outputs.text_report_path != ''
        uses: actions/upload-artifact@v6
        with:
          name: native-latest-text-diff-${{ steps.version.outputs.version }}
          path: ${{ steps.text_diff.outputs.text_report_path }}
          if-no-files-found: error

      - name: Explain native candidate boundary failure
        if: failure() && steps.verify.outputs.json_path != ''
        shell: bash
        run: |
          {
            echo "## Native candidate boundary failure"
            node scripts/promote-native-candidate.js --candidate "${{ steps.verify.outputs.json_path }}" 2>&1
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Prepare native failure handoff
        id: failure_handoff
        if: failure() && steps.verify.outputs.json_path != ''
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPORT_PATH="docs/native-latest-failures/${VERSION}.md"
          node scripts/prepare-native-failure-handoff.js \
            --candidate "${{ steps.verify.outputs.json_path }}" \
            --text-report "${{ steps.text_diff.outputs.text_report_path }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --head-sha "${{ github.sha }}" \
            --output "$REPORT_PATH"
          echo "report_path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          {
            echo "## Native failure handoff"
            echo "Prepared \`${REPORT_PATH}\`; the next step opens or updates a draft PR branch for maintainer takeover."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create native candidate failure handoff PR
        id: failure_handoff_pr
        if: failure() && steps.failure_handoff.outputs.report_path != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/native-latest-${{ steps.version.outputs.version }}-fix
          draft: true
          delete-branch: true
          commit-message: "chore: hand off macOS native ${{ steps.version.outputs.version }} failure"
          title: "fix: follow up macOS native ${{ steps.version.outputs.version }} candidate failure"
          body: |
            Automated handoff for a failed macOS arm64 native Claude Code candidate.

            This draft PR is created when the candidate does not pass native verification or display audit. The branch starts with a generated failure report so the maintainer can take it over directly, add the required translations or guard fix, and rerun the candidate workflow.

            Failure report: `${{ steps.failure_handoff.outputs.report_path }}`.

            Candidate JSON artifact: `native-latest-candidate-${{ steps.version.outputs.version }}`.

            Text diff report artifact: `native-latest-text-diff-${{ steps.version.outputs.version }}`.

      - name: Summarize native failure handoff PR
        if: failure() && steps.failure_handoff.outputs.report_path != ''
        shell: bash
        run: |
          PR_URL="${{ steps.failure_handoff_pr.outputs.pull-request-url }}"
          PR_BRANCH="${{ steps.failure_handoff_pr.outputs.pull-request-branch }}"
          PR_OPERATION="${{ steps.failure_handoff_pr.outputs.pull-request-operation }}"
          if [ -z "$PR_BRANCH" ]; then
            PR_BRANCH="codex/native-latest-${{ steps.version.outputs.version }}-fix"
          fi
          {
            echo "## Native failure handoff PR"
            echo "- Branch: \`${PR_BRANCH}\`"
            if [ -n "$PR_URL" ]; then
              echo "- Pull request: ${PR_URL}"
            else
              echo "- Pull request: not created; inspect the create-pull-request step logs."
            fi
            if [ -n "$PR_OPERATION" ]; then
              echo "- Operation: \`${PR_OPERATION}\`"
            fi
            echo "- Report: \`${{ steps.failure_handoff.outputs.report_path }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Promote native candidate support surfaces
        if: success()
        shell: bash
        run: |
          set +e
          PROMOTE_OUTPUT="$(node scripts/promote-native-candidate.js --candidate "${{ steps.verify.outputs.json_path }}" --write 2>&1)"
          PROMOTE_STATUS=$?
          set -e
          if [ "$PROMOTE_STATUS" -ne 0 ]; then
            {
              echo "## Native candidate boundary failure"
              printf '%s\n' "$PROMOTE_OUTPUT"
            } >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$PROMOTE_OUTPUT"
            exit "$PROMOTE_STATUS"
          fi
          printf '%s\n' "$PROMOTE_OUTPUT"
          node scripts/generate-plugin-support-window.js --write
          node scripts/generate-support-matrix.js
          node scripts/sync-readme-support-window.js --write
          node scripts/sync-doc-derived-counts.js --write
          node scripts/check-support-boundary.js
          node scripts/sync-readme-support-window.js --check
          node scripts/sync-doc-derived-counts.js --check

      - name: Detect native closeout changes
        id: closeout_changes
        if: success()
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Native latest closeout"
              echo "No source-of-truth or generated support changes; latest is already covered."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare plugin release metadata
        id: release
        if: success() && steps.closeout_changes.outputs.changed == 'true'
        shell: bash
        run: |
          node scripts/prepare-native-release-closeout.js --native-version "${{ steps.version.outputs.version }}" --date "$(date -u +%F)"
          PLUGIN_VERSION="$(node -p 'require("./plugin/manifest.json").version')"
          echo "plugin_version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
          node --test tests/native-latest-workflow.test.js tests/native-release-closeout.test.js

      - name: Create native candidate closeout PR
        if: success() && steps.closeout_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/native-latest-${{ steps.version.outputs.version }}
          draft: true
          delete-branch: true
          commit-message: "chore: promote macOS native ${{ steps.version.outputs.version }} and prepare v${{ steps.release.outputs.plugin_version }}"
          title: "chore: promote macOS native ${{ steps.version.outputs.version }} and prepare v${{ steps.release.outputs.plugin_version }}"
          body: |
            Automated closeout for a verified macOS arm64 native Claude Code candidate.

            This PR is generated only after native extract / patch / repack / --version and display audit pass. It updates the source-of-truth support config plus generated support surfaces, bumps plugin/manifest.json and CHANGELOG.md to v${{ steps.release.outputs.plugin_version }}, and keeps unverified latest versions outside the public support claim.

            Candidate JSON is attached to the workflow run as `native-latest-candidate-${{ steps.version.outputs.version }}`.

            Text diff report artifact: `native-latest-text-diff-${{ steps.version.outputs.version }}`.

            After this PR merges, publish the prepared plugin version with tag `v${{ steps.release.outputs.plugin_version }}` and a GitHub Release, then run `bash scripts/preflight.sh --release-state`.
